<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Manager</title>
    <link rel="stylesheet" href="assets/styles/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="assets/scripts/script.js" defer></script>
</head>
<body>

    <header>
        <h1>Product Manager</h1>
    </header>

    <main>

        <!-- Left Side -->
        <aside>

            <div class="buttons">
                <button id="addBtn" class="active">Add Product</button>
                <button id="updateBtn">Update Product</button>
            </div>

            <!-- This section can later be replaced with Update Form using JS -->
            <section id="form-section">

                <h2 id="formTitle">Add New Product</h2>

                <form>

                    <label for="category" id="categoryLabel">Select Product</label>
                    <select name="category" id="category">
                        <option value="">Select Products</option>
                    </select>

                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        placeholder="e.g. iPhone 15">

                    <label for="price">Price</label>
                    <input
                        type="number"
                        id="price"
                        placeholder="e.g. 99.99">

                    <label for="stock">Stock</label>
                    <input
                        type="number"
                        id="stock"
                        placeholder="e.g. 10">

                    <label id="skuLabel" for="sku">SKU</label>
                    <input
                        type="text"
                        id="sku"
                        placeholder="e.g. APL-001">

                    <button id="submitForm" type="submit">
                        Add Product
                    </button>

                </form>

            </section>

        </aside>

        <!-- Right Side -->
        <section class="content">

            <div class="title">
                <h2>Product List</h2>
                <div>
                    <button id="deleteCacheBtn">Delete Cache
                        <i data-lucide="trash-2"></i>
                    </button>
                    <span id="product-count">0 Items</span>
                </div>
            </div>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>SKU</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </section>

    </main>

</body>
</html>
